name: Build Billiard App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build
        run: npx vite build
        
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: billiard-app-build
          path: dist/
